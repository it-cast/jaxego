# Jaxego — local development stack.
# Run from the repo root:
#   cp .env.example .env
#   docker compose -f infra/docker-compose.yml up -d
#   curl -f localhost:8000/health
#
# Nginx is documented in infra/nginx/jaxego.conf for production; dev exposes the
# API directly on :8000 (D-06).

name: jaxego

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-jaxego}:${MYSQL_PASSWORD:-jaxego}@mysql:3306/${MYSQL_DATABASE:-jaxego}?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: ["arq", "app.workers.settings.WorkerSettings"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-jaxego}:${MYSQL_PASSWORD:-jaxego}@mysql:3306/${MYSQL_DATABASE:-jaxego}?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # Permite que o usuário de app (não-SUPER) crie os triggers append-only
      # (audit_log / delivery_state_transitions — RN-012) com binlog ligado.
      # MySQL 8 exige isto ou a privilege SUPER; no VPS de produção configurar igual.
      - --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jaxego}
      MYSQL_USER: ${MYSQL_USER:-jaxego}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jaxego}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-changeme-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  mysql_data:
    name: jaxego_mysql_data
