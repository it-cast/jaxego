# Jaxego — local development stack.
# Run from the repo root:
#   cp .env.example .env
#   docker compose -f infra/docker-compose.yml up -d
#   curl -f localhost:8000/health
#
# MySQL is EXTERNAL (not in this compose) — DATABASE_URL comes from ../.env.
# api/worker reach the host via `host.docker.internal` (extra_hosts below;
# needed on Linux — Docker Desktop on Mac/Windows resolves it natively).
#
# Nginx is documented in infra/nginx/jaxego.conf for production; dev exposes the
# API directly on :8000 (D-06).

name: jaxego

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      # DATABASE_URL vem do .env (MySQL externo, fora do Docker).
      REDIS_URL: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../apps/api/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: ["arq", "app.workers.settings.WorkerSettings"]
    env_file:
      - ../.env
    environment:
      # DATABASE_URL vem do .env (MySQL externo, fora do Docker).
      REDIS_URL: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../apps/api/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
