# Jaxego — production reverse proxy (Nginx).
#
# NOT used by the dev Docker Compose (dev exposes the API directly on :8000, D-06).
# This file documents the production fronting layer; wired for real in Phase 14.

upstream jaxego_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS in production (TLS terminated here or upstream LB).
    # return 301 https://$host$request_uri;

    client_max_body_size 20m;

    # Health/readiness probe (root, no /v1 prefix) — same path the container
    # HEALTHCHECK and CI exercise.
    location = /health {
        proxy_pass http://jaxego_api;
        access_log off;
    }

    location / {
        proxy_pass http://jaxego_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Propagate request id end-to-end (matches X-Request-ID middleware).
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
