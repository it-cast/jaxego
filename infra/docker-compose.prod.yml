# Jaxegô — stack de PRODUÇÃO (piloto) com MySQL EXTERNO.
# Diferente do docker-compose.yml (dev, que sobe um MySQL próprio):
#   - NÃO sobe MySQL — usa o DATABASE_URL do .env (seu banco gerenciado).
#   - Redis fica no compose (interno, sem porta exposta).
#   - API + worker leem TODAS as variáveis de ../.env (montado pelo deploy a partir dos secrets).
#
# Uso (a partir de infra/):
#   docker compose -f docker-compose.prod.yml --env-file ../.env up -d
#
# Pré-requisitos do seu MySQL 8:
#   - database criado (o que estiver no DATABASE_URL, ex.: `jaxego`)
#   - usuário com permissão de DDL + criar TRIGGER; e o servidor com
#     log_bin_trust_function_creators=1 (ou a privilege SUPER) — RN-012 (triggers append-only).
#   - alcançável a partir do servidor de deploy.

name: jaxego

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      # Redis é o do compose; DATABASE_URL vem do .env (seu MySQL externo).
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: ["arq", "app.workers.settings.WorkerSettings"]
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
