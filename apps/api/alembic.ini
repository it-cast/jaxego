# Alembic configuration for Jaxego API.
# The database URL is NOT set here — env.py reads it from settings/env
# (DATABASE_URL), so no credentials live in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally omitted; resolved in env.py from DATABASE_URL.

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
