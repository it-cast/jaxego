<main class="jx-area-config">
  <h1 class="jx-area-config__title">
    Configurações da <em>área</em> · {{ areaName() }}
  </h1>

  @if (saveError()) {
    <jx-error-state
      [message]="saveError()!"
      retryLabel="Tentar de novo"
      (retry)="save()"
    />
  }

  <form class="jx-area-config__form" [formGroup]="form" (ngSubmit)="save()">
    <!-- Validação de entregadores -->
    <fieldset class="jx-area-config__fieldset">
      <legend>Validação de entregadores</legend>
      <label class="jx-area-config__field">
        <span class="jx-area-config__label">Nível exigido</span>
        <select class="jx-area-config__select" formControlName="kyc_level">
          <option value="simples">Simples</option>
          <option value="completa">Completa</option>
        </select>
      </label>
    </fieldset>

    <!-- Despacho -->
    <fieldset class="jx-area-config__fieldset jx-area-config__fieldset--2col">
      <legend>Despacho</legend>

      <label class="jx-area-config__field">
        <span class="jx-area-config__label">Tempo de oferta (s)</span>
        <input
          class="jx-area-config__input jx-area-config__input--mono"
          inputmode="numeric"
          type="number"
          min="10"
          max="60"
          formControlName="timeout_oferta_s"
          [attr.aria-invalid]="rangeError('timeout_oferta_s') ? 'true' : null"
          [attr.aria-describedby]="
            rangeError('timeout_oferta_s') ? 'oferta-error' : null
          "
        />
        @if (rangeError('timeout_oferta_s'); as err) {
          <p class="jx-area-config__error" id="oferta-error">{{ err }}</p>
        }
      </label>

      <label class="jx-area-config__field">
        <span class="jx-area-config__label">Janela de favoritos (s)</span>
        <input
          class="jx-area-config__input jx-area-config__input--mono"
          inputmode="numeric"
          type="number"
          min="30"
          max="180"
          formControlName="timeout_favoritos_s"
          [attr.aria-invalid]="rangeError('timeout_favoritos_s') ? 'true' : null"
          [attr.aria-describedby]="
            rangeError('timeout_favoritos_s') ? 'favoritos-error' : null
          "
        />
        @if (rangeError('timeout_favoritos_s'); as err) {
          <p class="jx-area-config__error" id="favoritos-error">{{ err }}</p>
        }
      </label>

      <label class="jx-area-config__field">
        <span class="jx-area-config__label">
          Entregas simultâneas por entregador
          <span class="jx-area-config__tooltip-wrap">
            <button
              type="button"
              class="jx-area-config__help-btn"
              aria-describedby="max-entregas-hint"
              tabindex="0"
            >?</button>
            <span
              class="jx-area-config__tooltip"
              id="max-entregas-hint"
              role="tooltip"
            >Máximo de entregas ativas que um entregador pode acumular antes de parar de receber ofertas (1–10).</span>
          </span>
        </span>
        <input
          class="jx-area-config__input jx-area-config__input--mono"
          inputmode="numeric"
          type="number"
          min="1"
          max="10"
          formControlName="max_entregas_simultaneas"
          [attr.aria-invalid]="rangeError('max_entregas_simultaneas') ? 'true' : null"
          [attr.aria-describedby]="
            rangeError('max_entregas_simultaneas') ? 'max-entregas-error' : null
          "
        />
        @if (rangeError('max_entregas_simultaneas'); as err) {
          <p class="jx-area-config__error" id="max-entregas-error">{{ err }}</p>
        }
      </label>
    </fieldset>

    @if (saved()) {
      <p class="jx-area-config__saved" role="status">Configurações salvas.</p>
    }

    <button
      type="submit"
      class="jx-area-config__save"
      [disabled]="saving()"
      [attr.aria-busy]="saving() ? 'true' : null"
    >
      {{ saving() ? 'Salvando…' : 'Salvar configurações' }}
    </button>
  </form>

</main>
