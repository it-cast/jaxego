<header class="jx-entregas__head">
  <h1 class="jx-entregas__title">Entregas</h1>
  <button type="button" class="jx-entregas__new" (click)="goNova()">+ Nova entrega</button>
</header>

<form class="jx-entregas__filters" (submit)="$event.preventDefault(); filterAndLoad()">
  <label class="jx-entregas__filter">
    <span>Estado</span>
    <select [(ngModel)]="stateFilter" name="state" (change)="filterAndLoad()">
      <option value="">Todos</option>
      <option value="AGENDADA">Agendada</option>
      <option value="CRIADA">Procurando</option>
      <option value="ACEITA">Aceita</option>
      <option value="COLETADA">A caminho</option>
      <option value="ENTREGUE">Entregue</option>
      <option value="FINALIZADA">Finalizada</option>
      <option value="RECUSADA_NO_DESTINO">Recusada no destino</option>
      <option value="CANCELADA">Cancelada</option>
    </select>
  </label>
  <label class="jx-entregas__filter">
    <span>Pagamento</span>
    <select [(ngModel)]="paymentFilter" name="payment" (change)="filterAndLoad()">
      <option value="">Todos</option>
      <option value="direct">Direto</option>
      <option value="pix">PIX</option>
      <option value="card">Cartão</option>
    </select>
  </label>
</form>

<jx-data-table
  [columns]="columns"
  [rows]="rows()"
  [state]="tableState()"
  [hasActions]="true"
  [trackBy]="trackById"
  caption="Entregas da loja"
  [emptyTitle]="hasFilters() ? 'Nenhuma entrega com esses filtros.' : 'Nenhuma entrega ainda.'"
  [emptyMessage]="hasFilters() ? undefined : 'Crie sua primeira entrega.'"
  [emptyCtaLabel]="hasFilters() ? 'Limpar filtros' : 'Nova entrega'"
  (emptyCta)="hasFilters() ? clearFilters() : goNova()"
  errorMessage="Não foi possível carregar suas entregas."
  (retry)="load()"
>
  <ng-template #row let-item>
    <jx-delivery-row
      [delivery]="item"
      (cancelDelivery)="onCancel($event)"
      (view)="onView($event)"
    ></jx-delivery-row>
  </ng-template>
</jx-data-table>

@if (totalPages() > 1) {
  <nav class="jx-entregas__pagination" aria-label="Paginação">
    <button
      type="button"
      class="jx-entregas__page-btn"
      [disabled]="currentPage() === 0"
      (click)="goPage(currentPage() - 1)"
      aria-label="Página anterior"
    >
      <fa-icon [icon]="iconPrev" aria-hidden="true" /> Anterior
    </button>
    <span class="jx-entregas__page-info">Página {{ currentPage() + 1 }} de {{ totalPages() }}</span>
    <button
      type="button"
      class="jx-entregas__page-btn"
      [disabled]="currentPage() >= totalPages() - 1"
      (click)="goPage(currentPage() + 1)"
      aria-label="Próxima página"
    >
      Próxima <fa-icon [icon]="iconNext" aria-hidden="true" />
    </button>
  </nav>
}

@if (cancelTarget(); as item) {
  <div class="jx-modal-backdrop" (click)="dismissCancel()" aria-hidden="true"></div>
  <div class="jx-modal" role="dialog" aria-modal="true" aria-labelledby="cancel-modal-title">
    <div class="jx-modal__icon">
      <fa-icon [icon]="iconWarn" aria-hidden="true" />
    </div>
    <h2 id="cancel-modal-title" class="jx-modal__title">Cancelar entrega?</h2>
    <p class="jx-modal__body">
      Entrega <strong>#{{ item.public_token.slice(0, 6).toUpperCase() }}</strong> ainda não foi aceita.
      O cancelamento é gratuito.
    </p>
    <div class="jx-modal__actions">
      <button
        type="button"
        class="jx-modal__btn jx-modal__btn--secondary"
        [disabled]="cancelling()"
        (click)="dismissCancel()"
      >
        Voltar
      </button>
      <button
        type="button"
        class="jx-modal__btn jx-modal__btn--danger"
        [disabled]="cancelling()"
        (click)="confirmCancel()"
      >
        {{ cancelling() ? 'Cancelando…' : 'Sim, cancelar' }}
      </button>
    </div>
  </div>
}
