<main class="jx-login" [attr.aria-busy]="loading()">
  <header class="jx-login__header">
    <h1 class="jx-h1">Jaxegô. Chegou <em>rapidinho.</em></h1>
  </header>

  <form class="jx-login__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="jx-field">
      <label class="jx-label" for="email">E-mail</label>
      <input
        #emailInput
        id="email"
        type="email"
        formControlName="email"
        class="jx-input"
        inputmode="email"
        autocomplete="email"
        enterkeyhint="next"
        placeholder="voce@exemplo.com.br"
      />
    </div>

    <div class="jx-field">
      <label class="jx-label" for="password">Senha</label>
      <div class="jx-input-wrap">
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          class="jx-input"
          autocomplete="current-password"
          [attr.enterkeyhint]="totpRequired() ? 'next' : 'send'"
        />
        <button
          type="button"
          class="jx-input-toggle"
          [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
          (click)="togglePassword()"
        >
          <fa-icon [icon]="showPassword() ? faEyeSlash : faEye" aria-hidden="true" />
        </button>
      </div>
    </div>

    @if (totpRequired()) {
      <div class="jx-field" aria-live="polite">
        <label class="jx-label" for="totp">Código de verificação</label>
        <input
          #totpInput
          id="totp"
          type="text"
          formControlName="totp"
          class="jx-input jx-mono"
          inputmode="numeric"
          autocomplete="one-time-code"
          enterkeyhint="send"
          maxlength="6"
        />
        <p class="jx-caption">Digite o código do seu app autenticador.</p>
      </div>
    }

    @if (errorMessage()) {
      <div #errorBlock tabindex="-1" class="jx-login__error">
        <jx-error-state [message]="errorMessage()!" />
      </div>
    }

    <button type="submit" class="jx-login__submit" [disabled]="loading()">
      Entrar
    </button>

    @if (loading()) {
      <jx-loading-skeleton variant="block" height="44px" />
    }
  </form>

  <section class="jx-login__cta-block">
    @if (!isApp) {
      <a routerLink="/loja/cadastro">Cadastrar minha loja →</a>
    } @else {
      <a routerLink="/entregador/cadastro">Quero entregar →</a>
    }
  </section>

  <footer class="jx-login__footer">jaxego.com.br · Grupo Itcast</footer>
</main>
