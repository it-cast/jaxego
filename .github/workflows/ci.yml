name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/api

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: typecheck (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen
      - name: basedpyright
        run: uv run basedpyright

  test:
    name: test (pytest)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root
          MYSQL_DATABASE: jaxego
          MYSQL_USER: jaxego
          MYSQL_PASSWORD: jaxego
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pci-root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql+aiomysql://jaxego:jaxego@127.0.0.1:3306/jaxego?charset=utf8mb4
      REDIS_URL: redis://127.0.0.1:6379/0
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen
      - name: Habilita criação de trigger (log_bin_trust_function_creators)
        # O service MySQL liga binlog e o user de app não tem SUPER; as triggers
        # append-only (RN-012) exigem esta flag. Setada via root (CI only).
        run: mysql -h 127.0.0.1 -P 3306 -uroot -pci-root -e "SET GLOBAL log_bin_trust_function_creators=1;"
      - name: Apply migrations (catches broken migration chain)
        run: uv run alembic upgrade head
      - name: Run tests (health + sentry + naive-datetime guard)
        run: uv run pytest -q
      - name: Naive datetime guard (TD-010)
        run: uv run python tools/check_naive_datetime.py

  # -------------------------------------------------------------------------
  # Phase 14 — gates de release do frontend (test + lint + build + perf budget).
  web:
    name: web (test + lint + build + perf)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test (headless)
        run: npm run test -- --watch=false --browsers=ChromeHeadless
      - name: Build (production)
        run: npm run build
      - name: Zero hex hardcoded (design tokens integrity)
        run: |
          # Camada de tokens (src/styles/) DEFINE as cores — hex ali é a fonte canônica.
          # Exceções técnicas: #000 em CSS mask (offer-timer), theme-color do manifest, hex em comentário.
          HITS=$(grep -rnE "#[0-9A-Fa-f]{3,6}\b" src --include="*.scss" \
            | grep -v "src/styles/" \
            | grep -viE "mask:|radial-gradient|theme-color" \
            | grep -vE "//|/\*" | wc -l)
          echo "hex suspeitos: $HITS"; test "$HITS" -eq 0
      - name: Lighthouse CI (perf budget — informativo)
        run: npx --yes @lhci/cli autorun --config=../../tooling/ci/lighthouserc.json || true

  # -------------------------------------------------------------------------
  # Phase 14 — build de APK debug (Android). Release assinado = UAT humano (keystore).
  # Roda só em tag/dispatch para não onerar todo PR; informativo (TD do release assinado).
  apk:
    name: apk (Android debug)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [web]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install + build web
        run: npm ci && npm run build
      - name: Add Android platform
        run: npx --yes cap add android || npx --yes cap sync android
      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaxego-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

# ---------------------------------------------------------------------------
# Deploy por tag fica para o pipeline de produção (gated pelo RELEASE-CHECKLIST.md
# da Phase 14 — em especial o cutover Safe2Pay TD-10-01..04, dependente do contrato).
