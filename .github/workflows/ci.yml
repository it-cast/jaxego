name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: typecheck (basedpyright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen
      - name: basedpyright
        run: uv run basedpyright

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root
          MYSQL_DATABASE: jaxego
          MYSQL_USER: jaxego
          MYSQL_PASSWORD: jaxego
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pci-root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql+aiomysql://jaxego:jaxego@127.0.0.1:3306/jaxego?charset=utf8mb4
      REDIS_URL: redis://127.0.0.1:6379/0
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: uv sync --frozen
      - name: Habilita criação de trigger (log_bin_trust_function_creators)
        # O service MySQL liga binlog e o user de app não tem SUPER; as triggers
        # append-only (RN-012) exigem esta flag. Setada via root (CI only).
        run: mysql -h 127.0.0.1 -P 3306 -uroot -pci-root -e "SET GLOBAL log_bin_trust_function_creators=1;"
      - name: Apply migrations (catches broken migration chain)
        run: uv run alembic upgrade head
      - name: Run tests (health + sentry + naive-datetime guard)
        run: uv run pytest -q
      - name: Naive datetime guard (TD-010)
        run: uv run python tools/check_naive_datetime.py

  # -------------------------------------------------------------------------
  # Frontend monorepo (npm workspaces na raiz). packages/shared (design system +
  # core/auth) é consumido por apps/web (admin+loja) e apps/app (entregador).
  # O zero-hex roda uma vez (raiz) cobrindo a lib + os dois apps.
  web:
    name: web (test + lint + build + perf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install (workspaces, raiz)
        run: npm ci
      - name: Lint web
        run: npm run lint:web
      - name: Test web (headless — inclui specs de packages/shared)
        run: npm run test:web
      - name: Build web (admin + loja)
        run: npm run build:web && npm run build:loja --workspace @jaxego/web && npm run build:admin --workspace @jaxego/web
      - name: Zero hex hardcoded (design tokens integrity)
        run: |
          # A camada de tokens (packages/shared/src/styles/) DEFINE as cores — hex ali é a fonte canônica.
          # Exceções técnicas: mask CSS, radial-gradient, theme-color do manifest, hex em comentário.
          HITS=$(grep -rnE "#[0-9A-Fa-f]{3,6}\b" packages/shared/src apps/web/src apps/app/src --include="*.scss" \
            | grep -v "packages/shared/src/styles/" \
            | grep -viE "mask:|radial-gradient|theme-color" \
            | grep -vE "//|/\*" | wc -l)
          echo "hex suspeitos: $HITS"; test "$HITS" -eq 0
      - name: Lighthouse CI (perf budget — informativo)
        run: npx --yes @lhci/cli autorun --config=tooling/ci/lighthouserc.json || true

  app:
    name: app (entregador — test + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install (workspaces, raiz)
        run: npm ci
      - name: Lint app
        run: npm run lint:app
      - name: Test app (headless)
        run: npm run test:app
      - name: Build app (entregador)
        run: npm run build:app

  # -------------------------------------------------------------------------
  # Build de APK debug (Android) do app do entregador (apps/app). Release assinado
  # = UAT humano (keystore). Roda só em tag/dispatch; informativo.
  apk:
    name: apk (Android debug — entregador)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [web, app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install + build app
        run: npm ci && npm run build:app
      - name: Add/sync Android platform
        working-directory: apps/app
        run: npx --yes cap add android || npx --yes cap sync android
      - name: Assemble debug APK
        working-directory: apps/app/android
        run: ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaxego-debug-apk
          path: apps/app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

# ---------------------------------------------------------------------------
# Deploy por tag fica para o pipeline de produção (gated pelo RELEASE-CHECKLIST.md).
