name: Deploy (piloto)

# Deploy por SSH no servidor. Dispara no push para master (após o CI) ou manual.
# Os VALORES vêm dos GitHub Actions Secrets (Settings → Secrets and variables → Actions).
# Nada de secret no código — só `${{ secrets.NOME }}`.

on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy via ssh
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Encaminha os secrets como env para o script remoto (não aparecem em log).
          envs: JWT_SECRET,DATABASE_URL,REDIS_URL,SENTRY_DSN,B2_KEY_ID,B2_APP_KEY,B2_KYC_BUCKET,SES_API_TOKEN,SMS_ZENVIA_TOKEN,VAPID_PRIVATE_KEY,VAPID_PUBLIC_KEY,SAFE2PAY_TOKEN_ENCRYPT_KEY,SAFE2PAY_WEBHOOK_SECRET,RSA_PRIVATE_KEY,RSA_PUBLIC_KEY,REVENUE_SHARE_DEFAULT_PCT
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/jaxego
            git fetch --all
            git reset --hard origin/master

            # Monta o .env de produção a partir dos secrets do Actions (config estática inline).
            umask 177
            cat > apps/api/.env <<EOF
            ENVIRONMENT=production
            APP_VERSION=1.0.0
            LOG_LEVEL=INFO
            JWT_SECRET=${JWT_SECRET}
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
            SENTRY_DSN=${SENTRY_DSN:-}
            RECEITA_BASE_URL=https://minhareceita.org
            RECEITA_BRASILAPI_URL=https://brasilapi.com.br/api/cnpj/v1
            RECEITA_ALLOWLIST_HOSTS=minhareceita.org,brasilapi.com.br
            B2_KEY_ID=${B2_KEY_ID}
            B2_APP_KEY=${B2_APP_KEY}
            B2_ENDPOINT_URL=https://s3.us-west-004.backblazeb2.com
            B2_REGION=us-west-004
            B2_KYC_BUCKET=${B2_KYC_BUCKET}
            B2_ALLOWLIST_HOSTS=s3.us-west-004.backblazeb2.com
            SES_SEND_URL=https://email.sa-east-1.amazonaws.com/send
            SES_API_TOKEN=${SES_API_TOKEN:-}
            SES_ALLOWLIST_HOSTS=email.sa-east-1.amazonaws.com
            SMS_ZENVIA_URL=https://api.zenvia.com/v2/channels/sms/messages
            SMS_ZENVIA_TOKEN=${SMS_ZENVIA_TOKEN:-}
            SMS_ALLOWLIST_HOSTS=api.zenvia.com
            GEOCODING_BASE_URL=https://nominatim.openstreetmap.org
            GEOCODING_ALLOWLIST_HOSTS=nominatim.openstreetmap.org
            OSRM_BASE_URL=https://router.project-osrm.org
            OSRM_PROFILE=driving
            OSRM_ALLOWLIST_HOSTS=router.project-osrm.org
            VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
            VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
            VAPID_CLAIM_SUB=mailto:ops@jaxego.com.br
            SAFE2PAY_SANDBOX=true
            SAFE2PAY_API_KEY=
            SAFE2PAY_TOKEN_ENCRYPT_KEY=${SAFE2PAY_TOKEN_ENCRYPT_KEY:-}
            SAFE2PAY_WEBHOOK_SECRET=${SAFE2PAY_WEBHOOK_SECRET:-}
            RSA_PRIVATE_KEY=${RSA_PRIVATE_KEY:-}
            RSA_PUBLIC_KEY=${RSA_PUBLIC_KEY:-}
            SAFE2PAY_JAXEGO_RECIPIENT=
            REVENUE_SHARE_DEFAULT_PCT=${REVENUE_SHARE_DEFAULT_PCT:-10}
            LLM_PROVIDER=stub
            EOF

            # Migrations + seed (idempotente) no host, depois sobe os serviços.
            cd apps/api
            uv sync --frozen
            uv run alembic upgrade head
            uv run python -m tools.seed
            cd ../infra
            docker compose up -d --build
            sleep 5
            curl -fsS http://localhost:8000/health
