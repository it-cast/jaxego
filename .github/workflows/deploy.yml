name: Deploy (piloto)

# Deploy por SSH no servidor. Dispara no push para master (após o CI) ou manual.
# Os VALORES vêm dos GitHub Actions Secrets (Settings → Secrets and variables → Actions).
# Nada de secret no código — só `${{ secrets.NOME }}`. MySQL é EXTERNO (DATABASE_URL).

on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy via ssh
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.2.0
        # Os secrets entram como env do runner aqui; `envs:` abaixo os encaminha ao servidor.
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: ${{ secrets.REPO_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_KYC_BUCKET: ${{ secrets.B2_KYC_BUCKET }}
          SES_API_TOKEN: ${{ secrets.SES_API_TOKEN }}
          SMS_ZENVIA_TOKEN: ${{ secrets.SMS_ZENVIA_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          SAFE2PAY_TOKEN_ENCRYPT_KEY: ${{ secrets.SAFE2PAY_TOKEN_ENCRYPT_KEY }}
          SAFE2PAY_WEBHOOK_SECRET: ${{ secrets.SAFE2PAY_WEBHOOK_SECRET }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
          RSA_PUBLIC_KEY: ${{ secrets.RSA_PUBLIC_KEY }}
          REVENUE_SHARE_DEFAULT_PCT: ${{ secrets.REVENUE_SHARE_DEFAULT_PCT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Encaminha os env acima ao script remoto (não aparecem em log).
          envs: DEPLOY_PATH,REPO_URL,JWT_SECRET,DATABASE_URL,SENTRY_DSN,B2_KEY_ID,B2_APP_KEY,B2_KYC_BUCKET,SES_API_TOKEN,SMS_ZENVIA_TOKEN,VAPID_PRIVATE_KEY,VAPID_PUBLIC_KEY,SAFE2PAY_TOKEN_ENCRYPT_KEY,SAFE2PAY_WEBHOOK_SECRET,RSA_PRIVATE_KEY,RSA_PUBLIC_KEY,REVENUE_SHARE_DEFAULT_PCT
          script_stop: true
          script: |
            set -euo pipefail
            # Caminho do repo no servidor: secret/var DEPLOY_PATH, ou ~/jaxego por padrão.
            TARGET="${DEPLOY_PATH:-$HOME/jaxego}"
            # URL do repo p/ o primeiro deploy (clone). Default ao origin público.
            REPO_URL="${REPO_URL:-https://github.com/it-cast/jaxego.git}"

            # Bootstrap idempotente: se ainda não é um repo git, clona; senão, atualiza.
            if [ ! -d "$TARGET/.git" ]; then
              echo "Repo ausente em $TARGET — clonando (primeiro deploy)."
              mkdir -p "$TARGET"
              git clone "$REPO_URL" "$TARGET"
            fi
            cd "$TARGET"
            git fetch --all
            git reset --hard origin/master

            # Monta o .env de produção (raiz) a partir dos secrets. MySQL é externo (DATABASE_URL).
            umask 177
            cat > .env <<EOF
            ENVIRONMENT=production
            APP_VERSION=1.0.0
            LOG_LEVEL=INFO
            JWT_SECRET=${JWT_SECRET}
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=redis://redis:6379/0
            SENTRY_DSN=${SENTRY_DSN:-}
            RECEITA_BASE_URL=https://minhareceita.org
            RECEITA_BRASILAPI_URL=https://brasilapi.com.br/api/cnpj/v1
            RECEITA_ALLOWLIST_HOSTS=minhareceita.org,brasilapi.com.br
            B2_KEY_ID=${B2_KEY_ID}
            B2_APP_KEY=${B2_APP_KEY}
            B2_ENDPOINT_URL=https://s3.us-west-004.backblazeb2.com
            B2_REGION=us-west-004
            B2_KYC_BUCKET=${B2_KYC_BUCKET}
            B2_ALLOWLIST_HOSTS=s3.us-west-004.backblazeb2.com
            SES_SEND_URL=https://email.sa-east-1.amazonaws.com/send
            SES_API_TOKEN=${SES_API_TOKEN:-}
            SES_ALLOWLIST_HOSTS=email.sa-east-1.amazonaws.com
            SMS_ZENVIA_URL=https://api.zenvia.com/v2/channels/sms/messages
            SMS_ZENVIA_TOKEN=${SMS_ZENVIA_TOKEN:-}
            SMS_ALLOWLIST_HOSTS=api.zenvia.com
            GEOCODING_BASE_URL=https://nominatim.openstreetmap.org
            GEOCODING_ALLOWLIST_HOSTS=nominatim.openstreetmap.org
            OSRM_BASE_URL=https://router.project-osrm.org
            OSRM_PROFILE=driving
            OSRM_ALLOWLIST_HOSTS=router.project-osrm.org
            VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
            VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
            VAPID_CLAIM_SUB=mailto:ops@jaxego.com.br
            SAFE2PAY_SANDBOX=true
            SAFE2PAY_API_KEY=
            SAFE2PAY_TOKEN_ENCRYPT_KEY=${SAFE2PAY_TOKEN_ENCRYPT_KEY:-}
            SAFE2PAY_WEBHOOK_SECRET=${SAFE2PAY_WEBHOOK_SECRET:-}
            RSA_PRIVATE_KEY=${RSA_PRIVATE_KEY:-}
            RSA_PUBLIC_KEY=${RSA_PUBLIC_KEY:-}
            SAFE2PAY_JAXEGO_RECIPIENT=
            REVENUE_SHARE_DEFAULT_PCT=${REVENUE_SHARE_DEFAULT_PCT:-10}
            LLM_PROVIDER=stub
            EOF

            cd infra
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file ../.env"
            $COMPOSE build
            $COMPOSE up -d redis
            # Migrations + seed dentro do container, contra o MySQL externo (DATABASE_URL do .env).
            $COMPOSE run --rm api alembic upgrade head
            $COMPOSE run --rm api python -m tools.seed
            $COMPOSE up -d api worker
            sleep 6
            curl -fsS http://localhost:8000/health
