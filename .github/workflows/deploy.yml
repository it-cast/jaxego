name: Deploy (piloto)

# Deploy por SSH no servidor. Dispara SÓ após o CI concluir com sucesso (workflow_run)
# ou manualmente (workflow_dispatch). Nunca em paralelo com o CI.
# Apenas a CONEXÃO SSH vem dos GitHub Secrets (host/user/key/port + DEPLOY_PATH/REPO_URL).
# Os secrets de APP (JWT, DATABASE_URL, B2, etc.) vivem no .env do SERVIDOR — gerenciado
# manualmente lá, persistente (gitignored), e o deploy NUNCA o sobrescreve.

on:
  workflow_dispatch:
  # Só dispara DEPOIS que o CI conclui (não em paralelo com o push). O job só roda
  # se o CI passou (conclusion == success) — assim não se faz deploy de código vermelho.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy via ssh
    runs-on: ubuntu-latest
    # Manual sempre; via workflow_run só quando o CI passou.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.2.0
        # Só localização do deploy entra como env; secrets de app ficam no .env do servidor.
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: ${{ secrets.REPO_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Encaminha os env acima ao script remoto (não aparecem em log).
          envs: DEPLOY_PATH,REPO_URL
          script_stop: true
          script: |
            set -euo pipefail
            # Caminho do repo no servidor: secret/var DEPLOY_PATH, ou ~/jaxego por padrão.
            TARGET="${DEPLOY_PATH:-$HOME/jaxego}"
            # URL do repo p/ o primeiro deploy (clone). Default ao origin público.
            REPO_URL="${REPO_URL:-https://github.com/it-cast/jaxego.git}"

            # Bootstrap idempotente: se ainda não é um repo git, clona; senão, atualiza.
            if [ ! -d "$TARGET/.git" ]; then
              echo "Repo ausente em $TARGET — clonando (primeiro deploy)."
              mkdir -p "$TARGET"
              git clone "$REPO_URL" "$TARGET"
            fi
            cd "$TARGET"
            git fetch --all
            git reset --hard origin/master

            # O .env de produção é gerenciado NO SERVIDOR (gitignored, persistente).
            # O deploy não o gera nem sobrescreve. Falha cedo se ele não existir.
            if [ ! -f "$TARGET/.env" ]; then
              echo "ERRO: $TARGET/.env nao existe. Crie-o no servidor (JWT_SECRET, DATABASE_URL, etc.) antes do deploy." >&2
              exit 1
            fi

            # Pre-flight do DATABASE_URL: precisa existir, nao-vazio e SEM aspas
            # (o env_file do Docker mantem aspas literais -> quebra o make_url).
            DBURL_LINE="$(grep -E '^DATABASE_URL=' "$TARGET/.env" | head -1 | cut -d= -f2-)"
            if [ -z "$DBURL_LINE" ]; then
              echo "ERRO: DATABASE_URL ausente/vazio no $TARGET/.env." >&2
              exit 1
            fi
            case "$DBURL_LINE" in
              '"'*|"'"*)
                echo "ERRO: DATABASE_URL esta entre aspas no .env. Remova as aspas (o Docker env_file as mantem literais)." >&2
                exit 1 ;;
            esac

            cd infra
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file ../.env"
            $COMPOSE build
            $COMPOSE up -d redis
            # Migrations + seed dentro do container, contra o MySQL externo (DATABASE_URL do .env).
            $COMPOSE run --rm api alembic upgrade head
            $COMPOSE run --rm api python -m tools.seed
            $COMPOSE up -d api worker
            sleep 6
            curl -fsS http://localhost:8000/health
